    # - family: Fira Mono
    #   source: google
    # - family: Fira Code
    #   source: google
    # - family: Playfair Display
    #   source: google
    # - family: Inter
    #   source: google
  base: IBM Plex Sans
  headings: IBM Plex Sans
  monospace: IBM Plex Mono
  # base: IBM Plex Sans Condensed
  # headings: IBM Plex Serif
  # monospace: Plex Mono
  # base: Fira Sans Condensed
  # base: Fira Sans
  # headings: Fira Sans
  # monospace: Fira Mono
  # base: Inter
  # headings: Inter
  link:
    decoration: underline
