title: Lettre
author: Chris Mann
version: 0.1.2
quarto-required: ">=1.9.0"
contributes:
  formats:
    common:
      variables:
        labels:
          subject: "Objet"
      date-format: long
      date: today
    html:
      base-format: html
      page-layout: custom
      template: html/layout.html
      theme: none
      minipal: true
      css:
        - html/css/styles.css
        - html/css/boilerplate.css
      filters:
        - _filters/page.lua
        - _filters/validate.lua
    typst:
      base-format: typ
      template-partials:
        - typst/_partials/typst-template.typ
        - typst/_partials/typst-show.typ
      papersize: a4
      keep-typ: true
      toc: false
      filters:
        - _filters/page.lua
        - _filters/validate.lua
        - typst/_filters/divs.lua
    plain:
      base-format: plain
      template: plain/layout.txt
      filters:
        - _filters/page.lua
        - _filters/validate.lua
    md:
      base-format: markdown
      toc: false
      template: md/layout.md
      filters:
        - _filters/page.lua
        - _filters/validate.lua
        - md/_filters/tables.lua
    docx:
      base-format: docx
      reference-doc: docx/reference.docx
      toc: false
      filters:
        - _filters/page.lua
        - _filters/validate.lua
        - docx/_filters/divs.lua
    odt:
      base-format: odt
      reference-doc: odt/reference.odt
      filters:
        - _filters/page.lua
        - _filters/validate.lua
        - docx/_filters/divs.lua
    pdf:
      base-format: pdf
      template: pdf/layout.tex
      papersize: a4
      toc: false
      lof: false
      lot: false
      keep-tex: true
      include-in-header: pdf/_partials/header.tex
      include-before-body: pdf/_partials/body-before.tex
      include-after-body: pdf/_partials/body-after.tex
      filters:
        - _filters/page.lua
        - _filters/validate.lua
        - pdf/_filters/divs.lua