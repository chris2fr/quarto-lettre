title: Lettre
author: Chris Mann
version: 0.1.12
quarto-required: ">=1.9.0"
contributes:
  project:
    create:
      scaffold: scaffold/create.lua
  formats:
    common:
      variables:
        labels:
          subject: "Objet"
      date-format: long
      date: today
    html:
      french-quotes: true
      base-format: html
      page-layout: custom
      template: html/layout.html
      theme: none
      minipal: true
      css:
        - html/css/styles.css
        - html/css/boilerplate.css
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
        - html/_filters/biblio.lua
    typst:
      base-format: typst
      # csl: resources/biblio.csl
      template-partials:
        - typst/_partials/typst-template.typ
        - typst/_partials/typst-show.typ
      format-resources:
        - typst/quarto-lettre.typ
      papersize: a4
      keep-typ: true
      toc: false
      output-file: typst.pdf
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
        - typst/_filters/divs.lua
    plain:
      base-format: plain
      template: ../base/plain/layout.txt
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
    md:
      base-format: markdown
      toc: false
      template: ../base/md/layout.md
      wrap: none
      tabstop: 2
      preserve-tabs: false
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
        - ../base/md/_filters/tables.lua
    docx:
      base-format: docx
      reference-doc: docx/reference.docx
      toc: false
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
        - docx/_filters/divs.lua
    odt:
      base-format: odt
      reference-doc: odt/reference.odt
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
        - docx/_filters/divs.lua
    pdf:
      base-format: pdf
      template: pdf/layout.tex
      format-resources:
        - pdf/quarto-lettre.cls
      papersize: a4
      toc: false
      lof: false
      lot: false
      keep-tex: true
      csl: ../base/resources/biblio.csl
      include-before-body: pdf/_partials/body-before.tex
      include-after-body: pdf/_partials/body-after.tex
      filters:
        - ../base/_filters/page.lua
        - _filters/validate.lua
        - pdf/_filters/divs.lua