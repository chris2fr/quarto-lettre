title: Lettre
author: Chris Mann
version: 1.0.0
quarto-required: ">=1.9.0"
contributes:
  filters:
    - _filters/divs.lua
  formats:
    common:
      variables:
        labels:
          object: "Objet"
      date-format: long
      date: today
    html:
      page-layout: custom
      template: layout.html
      theme: none
      minipal: true
      css: 
        - static/css/styles.css
        - static/css/boilerplate.css
    pdf:
      template: layout.tex
      papersize: a4
      toc: false
      lof: false
      lot: false
      keep-tex: true
      include-in-header: _partials/header.tex
      indlude-before-body: _partials/body-before.tex
      include-after-body: _partials/body-after.tex
      filters:
        - _filters/divs.lua