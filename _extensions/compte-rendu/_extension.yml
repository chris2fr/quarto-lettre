title: Compte-rendu
author: Chris Mann
version: 0.1.0
quarto-required: ">=1.9.0"
contributes:
  project:
    create:
      scaffold: scaffold/create.lua
  formats:
    common:
      date-format: long
      date: today
    html:
      base-format: html
      page-layout: custom
      template: html/layout.html
      theme: none
      css:
        - html/css/styles.css
        - html/css/boilerplate.css
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
    typst:
      base-format: typ
      template: typst/layout.typ
      papersize: a4
      keep-typ: false
      toc: false
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
        - typst/_filters/divs.lua
    plain:
      base-format: plain
      template: plain/layout.txt
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
    pdf:
      base-format: pdf
      template: pdf/layout.tex
      papersize: a4
      toc: false
      lof: false
      lot: false
      keep-tex: false
      csl: ../lettre/resources/biblio.csl
      include-before-body: pdf/_partials/body-before.tex
      include-after-body: pdf/_partials/body-after.tex
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
        - pdf/_filters/divs.lua
