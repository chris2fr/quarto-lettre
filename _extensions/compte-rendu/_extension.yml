title: Compte-rendu
author: Chris Mann
version: 0.1.8
quarto-required: ">=1.9.0"
contributes:
  project:
    create:
      scaffold: scaffold/create.lua
  formats:
    common:
      date-format: long
      date: today
    html:
      base-format: html
      page-layout: custom
      template: html/layout.html
      theme: none
      css:
        - html/css/styles.css
        - html/css/boilerplate.css
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
    typst:
      base-format: typst
      template-partials:
        - typst/_partials/typst-template.typ
        - typst/_partials/typst-show.typ
      format-resources:
        - typst/quarto-lettre.typ
      papersize: a4
      keep-typ: true
      toc: false
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
        - typst/_filters/divs.lua
    plain:
      base-format: plain
      template: plain/layout.txt
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
    md:
      base-format: markdown
      toc: false
      template: md/layout.md
      wrap: none
      tabstop: 2
      preserve-tabs: false
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
        - md/_filters/tables.lua
        - md/_filters/divs.lua
    pdf:
      base-format: pdf
      template: pdf/layout.tex
      format-resources:
        - pdf/quarto-lettre.cls
      papersize: a4
      toc: false
      lof: false
      lot: false
      keep-tex: true
      csl: ../lettre/resources/biblio.csl
      include-before-body: pdf/_partials/body-before.tex
      include-after-body: pdf/_partials/body-after.tex
      filters:
        - ../lettre/_filters/page.lua
        - _filters/validate.lua
        - pdf/_filters/divs.lua
