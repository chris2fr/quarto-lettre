# minimal brand.yml enabling dark mode
# replace with your brand colors, logos, and typography!
meta:
  name: Les Grands Voisins
  url: https://www.lesgrandsvoisins.com

logo: 
  small: logo/logo-lesgrandsvoisins-300-50-white.png
  medium: logo/logo-lesgrandsvoisins-600-100-white.png
  large: logo/logo-lesgrandsvoisins-900-150-white.png

typography:
  fonts:
    - family: Jura
      source: google
    - family: Space Mono
      source: google
    - family: Fira Sans
      source: google
  base: Fira Sans
  headings: Jura
  link:
    decoration: underline
  monospace: Space Mono
  monospace-inline:
    color: "#222222"
    background-color: "#ddeaf1" # or use a named color from `color`
  monospace-block: 
    background-color: "#eef4f8"

color:
  background:
    light: "#eee"
    dark: "#000"
  foreground:
    light: "#000"
    dark: "#eee"